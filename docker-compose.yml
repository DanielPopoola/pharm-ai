services:
    postgres:
        image: pgvector/pgvector:pg18
        environment:
            POSTGRES_USER: pharmai
            POSTGRES_PASSWORD: pharmai
            POSTGRES_DB: pharmai
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U pharmai"]
            interval: 5s
            timeout: 5s
            retries: 5
        volumes:
            - pharmai_data:/var/lib/postgresql

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"

volumes:
    pharmai_data:
