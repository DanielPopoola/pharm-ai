services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: pharmai
      POSTGRES_PASSWORD: pharmai
      POSTGRES_DB: pharmai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmai"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pharmai_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    user: "${HOST_UID}:${HOST_GID}"
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    user: "${HOST_UID}:${HOST_GID}"
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    user: "${HOST_UID}:${HOST_GID}"
    command: celery -A app.worker.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    command: reflex run --env dev
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  pharmai_data: